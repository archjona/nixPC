general {
    hide_cursor = 1
}

background {
    monitor =
    path = /home/jona/nixos/wallpapers/wallpaper.png

    blur_size = 8
    blur_passes = 3
    noise = 0.015
    contrast = 1.1
    brightness = 0.65
    vibrancy = 0.15
    vibrancy_darkness = 0.2

    color = rgba(29, 32, 33, 0.88)  # Gruvbox Dark Overlay
}



label {
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(131, 165, 152, 1.0)   # Gruvbox Aqua
    font_size = 95
    font_family = JetBrains Mono Nerd Font
    position = 0, -60%      # weiter nach oben
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] date +"%A, %d %B"
    color = rgba(184, 187, 38, 1.0)    # Gruvbox Yellow
    font_size = 24
    font_family = JetBrains Mono Nerd Font
    position = 0, -45%      # direkt über Passwortfeld
    halign = center
    valign = center
}


input-field {
    monitor =
    size = 280, 55
    outline_thickness = 3

    outer_color = rgba(69, 133, 136, 1.0)   # Gruvbox Blue
    inner_color = rgba(40, 40, 40, 0.6)
    font_color = rgba(235, 219, 178, 1.0)   # Gruvbox Light FG

    dots_size = 0.35
    dots_spacing = 0.2
    dots_center = true

    fade_on_empty = true
    fade_timeout = 800

    rounding = 10

    check_color = rgba(152, 151, 26, 1.0)   # Gruvbox Green
    fail_color = rgba(204, 36, 29, 1.0)     # Gruvbox Red
    fail_text = access denied
    fail_transition = 250

    position = 0, 0   # mittig auf dem Bildschirm
    halign = center
    valign = center
}
